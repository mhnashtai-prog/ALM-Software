<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ALM · Acesso Restrito</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════
   ALM LOGIN — ADMIN / STAFF PORTAL
   Blueprint v1.1  |  Dashboard-matched style
   ════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --gold:#C9A84C;
  --gold-hi:#E8C97A;
  --gold-dim:rgba(201,168,76,0.4);
  --green:#2ECC8A;
  --red:#E8455A;
  --text:rgba(235,215,160,0.88);
  --text2:rgba(210,185,130,0.45);
  --text3:rgba(210,185,130,0.25);
  --mono:'JetBrains Mono',monospace;
  --sans:'Outfit',system-ui,sans-serif;
  --display:'Cinzel',serif;
}

.desktop{
  width:100%;height:100vh;
  background:linear-gradient(155deg,#1A1520 0%,#2E2240 45%,#5C3D6E 75%,#C49A5A 100%);
  position:relative;
  font-family:'Inter',system-ui,sans-serif;
  display:flex;flex-direction:column;
  overflow:hidden;
  color:var(--text);
}

/* ── WAVE BG ── */
.wave-bg{position:absolute;inset:0;pointer-events:none;z-index:1}

/* ── TASKBAR ── */
.taskbar{
  height:42px;flex-shrink:0;
  background:rgba(12,8,20,0.72);
  border-bottom:0.5px solid rgba(210,180,120,0.1);
  display:flex;align-items:center;
  padding:0 18px;gap:10px;
  z-index:20;position:relative;
}
.tb-logo{font-family:var(--display);font-size:15px;font-weight:700;color:var(--gold-hi);letter-spacing:2px;flex-shrink:0}
.tb-sep{width:0.5px;height:12px;background:rgba(210,180,120,0.2);flex-shrink:0}
.tb-name{font-family:var(--display);font-size:8px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--text2)}
.tb-badge{display:flex;align-items:center;gap:6px;padding:3px 11px 3px 8px;background:rgba(201,168,76,0.07);border:0.5px solid rgba(201,168,76,0.2);border-radius:999px}
.tb-badge-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:0.7}
.tb-badge-lbl{font-family:var(--display);font-size:7.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:rgba(232,200,120,0.55)}
.tb-time{margin-left:auto;font-family:var(--mono);font-size:10px;color:rgba(210,180,100,0.35);flex-shrink:0}

/* ── BODY ── */
.body{flex:1;display:flex;position:relative;overflow:hidden}

/* ── LEFT ZONE ── */
.left-zone{width:44%;display:flex;align-items:center;justify-content:center;z-index:10;padding:0 0 0 clamp(22px,4vw,56px)}
.login-panel{width:100%;max-width:310px}

.portal-label{font-family:var(--display);font-size:8px;font-weight:600;letter-spacing:0.25em;text-transform:uppercase;color:rgba(210,180,100,0.35);margin-bottom:20px}

.field-label{display:block;font-family:var(--display);font-size:7.5px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--text2);margin-bottom:7px}

/* Role tabs */
.role-row{display:flex;gap:6px;margin-bottom:14px}
.role-btn{
  flex:1;padding:8px 4px;border-radius:7px;
  border:0.5px solid rgba(201,168,76,0.18);
  background:rgba(201,168,76,0.03);
  font-family:var(--display);font-size:7px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:rgba(210,185,130,0.35);cursor:pointer;transition:all .14s;
  text-align:center;
}
.role-btn:hover{border-color:rgba(201,168,76,0.3);color:rgba(210,185,130,0.65)}
.role-btn.active{background:rgba(201,168,76,0.13);border-color:rgba(201,168,76,0.35);color:var(--gold-hi)}

/* Text inputs */
.field-input{
  width:100%;padding:11px 13px;
  background:rgba(255,255,255,0.05);
  border:0.5px solid rgba(201,168,76,0.2);
  border-radius:8px;
  font-family:var(--sans);font-size:13px;color:var(--text);
  outline:none;transition:border-color .14s,background .14s;
  margin-bottom:10px;
}
.field-input:focus{border-color:var(--gold-dim);background:rgba(201,168,76,0.06)}
.field-input::placeholder{color:var(--text3)}
.field-input.err{border-color:rgba(232,69,90,0.55);background:rgba(232,69,90,0.05)}

/* Password wrapper for toggle */
.pw-wrap{position:relative;margin-bottom:10px}
.pw-wrap .field-input{margin-bottom:0;padding-right:40px}
.pw-toggle{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  width:26px;height:26px;border-radius:6px;border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .12s;padding:0;
}
.pw-toggle:hover{background:rgba(201,168,76,0.1)}
.pw-toggle svg{width:13px;height:13px;stroke:var(--text3);stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* Error */
.error-box{display:none;align-items:center;gap:7px;padding:8px 11px;margin-bottom:10px;background:rgba(232,69,90,0.08);border:0.5px solid rgba(232,69,90,0.26);border-radius:7px;font-family:var(--sans);font-size:11px;color:rgba(232,140,140,0.9)}
.error-box.show{display:flex}
.error-box svg{width:12px;height:12px;stroke:rgba(232,100,100,0.8);stroke-width:2;fill:none;flex-shrink:0;stroke-linecap:round;stroke-linejoin:round}

/* Enter btn */
.btn-enter{width:100%;padding:12px;border-radius:8px;background:rgba(201,168,76,0.13);border:0.5px solid var(--gold-dim);font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold-hi);cursor:pointer;transition:all .17s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-enter:hover{background:rgba(201,168,76,0.23);border-color:rgba(201,168,76,0.52)}
.btn-enter:active{transform:scale(0.98)}
.btn-enter svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

.demo-hint{text-align:center;font-family:var(--mono);font-size:8px;color:var(--text3);margin-top:9px;letter-spacing:0.04em}

/* ── VERTICAL DIVIDER ── */
.divider{width:0.5px;background:rgba(210,180,100,0.08);margin:20px 0;align-self:stretch;z-index:5}

/* ── RIGHT ZONE ── */
.right-zone{flex:1;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:0 clamp(22px,4vw,56px) 0 0;position:relative;z-index:5}
.dot-wrap{position:absolute;left:-8%;top:50%;transform:translateY(-50%);width:78%;pointer-events:none;opacity:0.12}
.dot-wrap svg{width:100%;height:auto}
.hero{text-align:right;position:relative;z-index:2}
.alm-letters{font-size:clamp(80px,13vw,160px);font-weight:700;color:var(--gold-hi);line-height:0.85;letter-spacing:-6px}
.alm-sub{font-size:clamp(7px,0.75vw,11px);letter-spacing:0.2em;color:rgba(232,200,120,0.75);text-transform:uppercase;margin-top:clamp(6px,0.8vw,12px);font-weight:600}

/* ── BRANCH ROW ── */
.branch-row{height:36px;flex-shrink:0;background:rgba(10,6,18,0.45);border-top:0.5px solid rgba(210,180,100,0.08);display:flex;align-items:center;justify-content:center;gap:6px;z-index:10;padding:0 18px}
.branch-item{font-family:var(--display);font-size:clamp(7.5px,0.58vw,9.5px);font-weight:600;letter-spacing:0.1em;color:rgba(210,180,100,0.3);display:flex;align-items:center;gap:5px}
.branch-dot{width:4px;height:4px;border-radius:50%;background:rgba(201,168,76,0.25)}
.branch-sep{font-size:8px;color:rgba(201,168,76,0.12);margin:0 2px}

/* ── SUCCESS ── */
.success-overlay{display:none;position:absolute;inset:0;z-index:200;background:rgba(10,6,20,0.82);backdrop-filter:blur(10px);align-items:center;justify-content:center}
.success-overlay.show{display:flex}
.success-modal{background:rgba(20,12,36,0.98);border:0.5px solid rgba(46,204,138,0.36);border-radius:18px;padding:30px 26px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;max-width:268px;width:90%;animation:fadeUp .24s ease}
.suc-icon{width:50px;height:50px;border-radius:50%;background:rgba(46,204,138,0.1);border:0.5px solid rgba(46,204,138,0.3);display:flex;align-items:center;justify-content:center}
.suc-icon svg{width:22px;height:22px;stroke:var(--green);stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.suc-title{font-family:var(--display);font-size:14px;color:var(--green);letter-spacing:0.06em}
.suc-name{font-family:var(--mono);font-size:10px;padding:4px 14px;border-radius:999px;background:rgba(46,204,138,0.07);border:0.5px solid rgba(46,204,138,0.2);color:var(--green);letter-spacing:0.06em}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.shake{animation:shake .3s ease}

/* ── MOBILE ── */
@media(max-width:640px){
  .desktop{height:100dvh;overflow:hidden}
  .body{flex-direction:column;align-items:center;justify-content:flex-start;overflow:hidden;padding:0}
  .divider{display:none}
  .dot-wrap{display:none}
  .right-zone{order:-1;width:100%;flex-shrink:0;align-items:center;justify-content:center;padding:10px 0 4px}
  .hero{text-align:center}
  .alm-letters{font-size:clamp(44px,13vw,62px);letter-spacing:-2px;line-height:0.88}
  .alm-sub{font-size:8px;letter-spacing:0.16em;margin-top:4px}
  .left-zone{width:100%;flex:1;padding:0 16px;align-items:flex-start;justify-content:flex-start;overflow:hidden}
  .login-panel{width:100%;max-width:100%;padding-top:2px}
  .portal-label{margin-bottom:8px}
  .field-label{margin-bottom:5px}
  .role-row{margin-bottom:10px}
  .field-input{margin-bottom:7px;padding:9px 13px}
  .pw-wrap{margin-bottom:7px}
  .error-box{margin-bottom:7px}
  .btn-enter{padding:10px}
  .demo-hint{margin-top:5px}
  .branch-row{height:auto;min-height:24px;padding:3px 8px;flex-wrap:wrap;gap:3px}
  .branch-item{font-size:7px}
}
</style>
</head>

<script>
/* ── Role ── */
let activeRole='director';
function setRole(r,el){
  activeRole=r;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  clearError();
}

/* ── Password toggle ── */
let pwVisible=false;
function togglePw(){
  pwVisible=!pwVisible;
  document.getElementById('inp-pass').type=pwVisible?'text':'password';
  document.getElementById('eye-icon').innerHTML=pwVisible
    ?'<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    :'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

/* ── Error ── */
function clearError(){
  document.getElementById('error-box').classList.remove('show');
  document.getElementById('inp-email').classList.remove('err');
  document.getElementById('inp-pass').classList.remove('err');
}
function showError(msg){
  document.getElementById('error-msg').textContent=msg;
  document.getElementById('error-box').classList.add('show');
}

/* ── Destination map ── */
const DEST={
  director:'dashboard.html',
  secretariat:'dashboard.html',
  teacher:'teacher-portal.html',
};

/* ── Demo credentials ── */
const DEMO=[
  {email:'director@alm-madeira.com',   pass:'alm2026',role:'director'},
  {email:'secretariado@alm-madeira.com',pass:'alm2026',role:'secretariat'},
  {email:'professor@alm-madeira.com',  pass:'alm2026',role:'teacher'},
];

/* ── Login ── */
async function doLogin(){
  const email=document.getElementById('inp-email').value.trim();
  const pass=document.getElementById('inp-pass').value;
  const btn=document.getElementById('btn-enter');

  clearError();

  if(!email){showError('Introduza o seu email institucional.');return}
  if(!pass){showError('Introduza a sua palavra-passe.');return}
  if(!email.includes('@')){showError('Email inválido.');return}

  /* Loading */
  btn.style.opacity='0.6';btn.style.pointerEvents='none';
  btn.innerHTML='<svg viewBox="0 0 24 24" style="animation:spin 1s linear infinite;width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> A verificar…';

  await new Promise(r=>setTimeout(r,900));

  const match=DEMO.find(u=>u.email===email&&u.pass===pass&&u.role===activeRole);

  if(!match){
    btn.style.opacity='';btn.style.pointerEvents='';
    btn.innerHTML='<svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Entrar';
    document.getElementById('inp-email').classList.add('err');
    document.getElementById('inp-pass').classList.add('err');
    showError('Credenciais inválidas ou função incorrecta.');
    return;
  }

  /* Success */
  const roleLabel={director:'Direcção',secretariat:'Secretariado',teacher:'Professor'};
  document.getElementById('suc-name').textContent=`${roleLabel[match.role]} · ${email.split('@')[0]}`;
  document.getElementById('success-overlay').classList.add('show');
  setTimeout(()=>{window.location.href=DEST[match.role];},1500);
}

/* ── Clock ── */
function tick(){
  const n=new Date();
  document.getElementById('tb-time').textContent=
    n.toLocaleDateString('pt-PT',{weekday:'short',day:'numeric',month:'short',year:'numeric'})+
    ' · '+n.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'});
}
tick();setInterval(tick,60000);
</script>
</body>
</html>
