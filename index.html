<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ALM · Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --gold:       #C9A84C;
  --gold-light: #E8C97A;
  --gold-pale:  #F0DFA0;
  --gold-dim:   rgba(201,168,76,0.14);
  --gold-border:rgba(201,168,76,0.22);
  --gold-glow:  rgba(201,168,76,0.08);
  --navy:       #1A1520;
  --navy-deep:  #0F0A1C;
  --navy-mid:   #2E2240;
  --text:       #F0EAD6;
  --text-muted: rgba(240,234,214,0.5);
  --text-dim:   rgba(240,234,214,0.25);
}

html,body{
  height:100%;
  background:var(--navy-deep);
  font-family:'Barlow',sans-serif;
  color:var(--text);
  overflow:hidden;
}

/* ── Shell ── */
.shell{
  height:100vh;
  display:grid;
  grid-template-rows:50px 1fr 38px;
}

/* ── TOPBAR ── */
.topbar{
  background:rgba(10,6,20,0.9);
  border-bottom:1px solid var(--gold-border);
  display:flex;align-items:center;
  padding:0 28px;gap:14px;
  position:relative;z-index:10;
}
/* gold top-line accent like KLM's blue band */
.topbar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--gold) 30%,var(--gold-light) 50%,var(--gold) 70%,transparent 100%);
  opacity:.6;
}
.tb-crown{
  display:flex;align-items:flex-end;gap:2.5px;height:18px;flex-shrink:0;
}
.tb-crown span{
  display:block;width:4px;border-radius:2px 2px 0 0;
  background:var(--gold);
}
.tb-crown span:nth-child(1){height:10px}
.tb-crown span:nth-child(2){height:18px}
.tb-crown span:nth-child(3){height:10px}
.tb-wordmark{
  font-family:'Barlow Condensed',sans-serif;
  font-size:20px;font-weight:800;
  letter-spacing:5px;color:var(--gold-light);
  text-transform:uppercase;
}
.tb-rule{flex:1;height:1px;background:var(--gold-border);opacity:.4}
.tb-sub{
  font-size:9px;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;
  color:var(--text-dim);
}
.tb-time{
  font-size:10px;font-weight:400;
  color:var(--text-dim);letter-spacing:.05em;
}

/* ── BODY ── */
.body{
  display:grid;
  grid-template-columns:1fr 1px 420px;
  overflow:hidden;
}

/* ── LEFT: big wordmark ── */
.left{
  background:linear-gradient(145deg,var(--navy-deep) 0%,var(--navy) 50%,var(--navy-mid) 100%);
  display:flex;flex-direction:column;
  justify-content:flex-end;
  padding:0 0 52px 52px;
  position:relative;overflow:hidden;
}

/* route-map geometry — gold arcs instead of blue */
.geo{position:absolute;inset:0;pointer-events:none}

/* gold vertical stripe — KLM's structure in gold */
.gold-stripe{
  position:absolute;right:0;top:0;bottom:0;width:3px;
  background:linear-gradient(to bottom,transparent,var(--gold),transparent);
  opacity:.5;
}

.alm-block{position:relative;z-index:2}
.alm-pre{
  font-size:10px;font-weight:700;
  letter-spacing:.3em;text-transform:uppercase;
  color:var(--gold);margin-bottom:14px;
  display:flex;align-items:center;gap:12px;
}
.alm-pre::before{
  content:'';display:block;width:28px;height:1px;background:var(--gold);
}
.alm-letters{
  font-family:'Barlow',sans-serif;
  font-size:clamp(72px,10vw,140px);
  font-weight:800;
  color:var(--gold-light);
  line-height:.88;
  letter-spacing:.04em;
  text-transform:uppercase;
  text-shadow:0 2px 40px rgba(201,168,76,0.15);
}
.alm-full{
  font-size:clamp(9px,0.8vw,12px);
  font-weight:500;
  letter-spacing:.25em;text-transform:uppercase;
  color:var(--text-muted);
  margin-top:18px;
}

/* ── RULE ── */
.rule{background:var(--gold-border)}

/* ── RIGHT: login ── */
.right{
  background:rgba(10,6,20,0.6);
  display:flex;flex-direction:column;
  justify-content:center;
  padding:0 48px;
}

.login-label{
  font-size:9px;font-weight:700;
  letter-spacing:.28em;text-transform:uppercase;
  color:var(--gold);
  margin-bottom:26px;
  display:flex;align-items:center;gap:10px;
}
.login-label::after{
  content:'';flex:1;height:1px;background:var(--gold-border);
}

.name-input{
  width:100%;
  background:var(--gold-glow);
  border:1px solid var(--gold-border);
  border-radius:3px;
  padding:17px 20px;
  font-family:'Barlow',sans-serif;
  font-size:19px;font-weight:400;
  color:var(--text);
  outline:none;
  letter-spacing:.04em;
  transition:border-color .2s, background .2s, box-shadow .2s;
}
.name-input::placeholder{
  color:var(--text-dim);
  font-size:15px;letter-spacing:0;
}
.name-input:focus{
  border-color:var(--gold);
  background:rgba(201,168,76,0.1);
  box-shadow:0 0 0 3px rgba(201,168,76,0.07);
}

.btn{
  width:100%;margin-top:10px;
  padding:16px;
  background:var(--gold);
  border:none;border-radius:3px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;
  letter-spacing:.25em;text-transform:uppercase;
  color:var(--navy-deep);
  cursor:pointer;
  transition:background .2s, transform .15s, opacity .2s, box-shadow .2s;
  opacity:.25;pointer-events:none;
}
.btn.ready{opacity:1;pointer-events:auto}
.btn.ready:hover{
  background:var(--gold-light);
  transform:translateY(-1px);
  box-shadow:0 6px 24px rgba(201,168,76,0.22);
}
.btn.ready:active{transform:translateY(0)}

.hint{
  margin-top:14px;
  font-size:11px;font-weight:400;
  color:var(--text-dim);
  min-height:16px;letter-spacing:.04em;
  transition:color .2s;
}
.hint.found{color:var(--gold)}
.hint.error{color:rgba(232,100,100,0.8)}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}
.shake{animation:shake .35s ease}

/* ── STATUS BAR ── */
.statusbar{
  background:rgba(8,5,18,0.8);
  border-top:1px solid var(--gold-border);
  display:flex;align-items:center;
  padding:0 28px;gap:4px;
}
.loc{
  display:flex;align-items:center;gap:6px;
  font-size:9px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-dim);
  padding:0 8px;flex-shrink:0;
}
.loc-dot{width:5px;height:5px;border-radius:50%;background:rgba(201,168,76,0.2);flex-shrink:0}
.loc-dot.ok{background:var(--gold);box-shadow:0 0 5px rgba(201,168,76,0.5)}
.loc-sep{width:1px;height:12px;background:var(--gold-border);opacity:.4;flex-shrink:0}

/* ── Mobile ── */
@media(max-width:760px){
  html,body{overflow:auto}
  .shell{grid-template-rows:50px 1fr 38px;height:auto;min-height:100vh}
  .body{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .rule{display:none}
  .left{padding:44px 28px 36px;min-height:200px;justify-content:flex-end}
  .gold-stripe{top:auto;bottom:0;left:0;right:0;width:100%;height:2px}
  .right{padding:36px 28px 44px}
}
</style>
</head>
<body>
<div class="shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tb-crown">
      <span></span><span></span><span></span>
    </div>
    <div class="tb-wordmark">ALM</div>
    <div class="tb-rule"></div>
    <div class="tb-sub">Academia de Línguas da Madeira</div>
    <div style="width:20px"></div>
    <div class="tb-time" id="tb-time"></div>
  </div>

  <!-- BODY -->
  <div class="body">

    <!-- Left -->
    <div class="left">
      <div class="geo">
        <svg width="100%" height="100%" viewBox="0 0 800 560"
             preserveAspectRatio="xMidYMid slice" fill="none"
             xmlns="http://www.w3.org/2000/svg">
          <!-- concentric arcs — gold, very faint -->
          <circle cx="780" cy="60"  r="200" stroke="rgba(201,168,76,0.05)" stroke-width="1"/>
          <circle cx="780" cy="60"  r="320" stroke="rgba(201,168,76,0.04)" stroke-width="1"/>
          <circle cx="780" cy="60"  r="470" stroke="rgba(201,168,76,0.03)" stroke-width="1"/>
          <circle cx="780" cy="60"  r="650" stroke="rgba(201,168,76,0.02)" stroke-width="1"/>
          <!-- subtle grid -->
          <line x1="0" y1="180" x2="800" y2="180" stroke="rgba(201,168,76,0.03)" stroke-width="1"/>
          <line x1="0" y1="380" x2="800" y2="380" stroke="rgba(201,168,76,0.03)" stroke-width="1"/>
          <line x1="220" y1="0"  x2="220" y2="560" stroke="rgba(201,168,76,0.03)" stroke-width="1"/>
          <line x1="520" y1="0"  x2="520" y2="560" stroke="rgba(201,168,76,0.03)" stroke-width="1"/>
          <!-- route arc — dashed gold -->
          <path d="M 50 480 Q 380 80 750 260"
                stroke="rgba(201,168,76,0.14)" stroke-width="1.4"
                stroke-dasharray="4 9" stroke-linecap="round"/>
          <!-- route waypoints -->
          <circle cx="50"  cy="480" r="3.5" fill="rgba(201,168,76,0.35)"/>
          <circle cx="750" cy="260" r="3.5" fill="rgba(201,168,76,0.35)"/>
          <circle cx="385" cy="172" r="2"   fill="rgba(201,168,76,0.22)"/>
          <!-- dot constellation (same as dashboard but faded) -->
          <g opacity="0.08" fill="#E8C97A">
            <circle cx="80" cy="200" r="2"/><circle cx="98" cy="190" r="2"/><circle cx="116" cy="182" r="2"/>
            <circle cx="134" cy="178" r="2"/><circle cx="152" cy="181" r="2"/><circle cx="170" cy="190" r="2"/>
            <circle cx="188" cy="200" r="2"/><circle cx="206" cy="208" r="2"/><circle cx="224" cy="213" r="2"/>
            <circle cx="72" cy="218" r="2"/><circle cx="90" cy="207" r="2"/><circle cx="108" cy="198" r="2"/>
            <circle cx="126" cy="194" r="2"/><circle cx="144" cy="197" r="2"/><circle cx="162" cy="207" r="2"/>
            <circle cx="180" cy="217" r="2"/><circle cx="198" cy="226" r="2"/><circle cx="216" cy="231" r="2"/>
            <circle cx="66" cy="236" r="2"/><circle cx="84" cy="224" r="2"/><circle cx="102" cy="215" r="2"/>
            <circle cx="120" cy="211" r="2"/><circle cx="138" cy="214" r="2"/><circle cx="156" cy="224" r="2"/>
          </g>
        </svg>
      </div>

      <div class="gold-stripe"></div>

      <div class="alm-block">
        <div class="alm-pre">Portal de Acesso</div>
        <div class="alm-letters">ALM</div>
        <div class="alm-full">Academia de Línguas da Madeira · Funchal</div>
      </div>
    </div>

    <div class="rule"></div>

    <!-- Right: login -->
    <div class="right">
      <div class="login-label">Identificação</div>

      <input
        class="name-input"
        id="nameInput"
        type="text"
        placeholder="O seu primeiro nome"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        autofocus
        oninput="onType()"
        onkeydown="if(event.key==='Enter')enter()"
      />

      <button class="btn" id="btn" onclick="enter()">Entrar</button>

      <div class="hint" id="hint">Escreva o seu nome e prima Entrar</div>
    </div>

  </div>

  <!-- STATUS BAR -->
  <div class="statusbar">
    <div class="loc"><div class="loc-dot ok"></div>Funchal · Sede</div>
    <div class="loc-sep"></div>
    <div class="loc"><div class="loc-dot"></div>Machico</div>
    <div class="loc-sep"></div>
    <div class="loc"><div class="loc-dot"></div>S. Cruz</div>
    <div class="loc-sep"></div>
    <div class="loc"><div class="loc-dot"></div>R. Brava</div>
    <div class="loc-sep"></div>
    <div class="loc"><div class="loc-dot"></div>Calheta</div>
    <div class="loc-sep"></div>
    <div class="loc"><div class="loc-dot"></div>P. do Sol</div>
    <div class="loc-sep"></div>
    <div class="loc"><div class="loc-dot"></div>Estreito</div>
  </div>

</div>

<script>
function tick(){
  const d=new Date();
  document.getElementById('tb-time').textContent=
    d.toLocaleDateString('pt-PT',{weekday:'short',day:'numeric',month:'short'})+
    ' · '+d.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'});
}
tick(); setInterval(tick,30000);

/* ════════════════════════
   PILOT ACCESS LIST
   ════════════════════════ */
const ACCESS = {
  'director':    { role:'admin',   dest:'admin/dashboard.html' },
  'secretaria':  { role:'admin',   dest:'admin/dashboard.html' },
  'admin':       { role:'admin',   dest:'admin/dashboard.html' },

  'ana':         { role:'teacher', dest:'teachers/index.html' },
  'paulo':       { role:'teacher', dest:'teachers/index.html' },
  'professor':   { role:'teacher', dest:'teachers/index.html' },

  'maria':       { role:'student', dest:'students/index.html' },
  'joao':        { role:'student', dest:'students/index.html' },
  'sofia':       { role:'student', dest:'students/index.html' },
  'miguel':      { role:'student', dest:'students/index.html' },
  'aluno':       { role:'student', dest:'students/index.html' },
};

const LABELS = { admin:'Direcção', teacher:'Professor', student:'Aluno' };

function norm(s){
  return s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

const input = document.getElementById('nameInput');
const btn   = document.getElementById('btn');
const hint  = document.getElementById('hint');

function onType(){
  const val = input.value.trim();
  btn.classList.toggle('ready', val.length > 0);
  if(!val){ hint.className='hint'; hint.textContent='Escreva o seu nome e prima Entrar'; return; }
  const user = ACCESS[norm(val)];
  if(user){ hint.className='hint found'; hint.textContent='✓  '+LABELS[user.role]; }
  else    { hint.className='hint';       hint.textContent=''; }
}

function enter(){
  const val = input.value.trim();
  if(!val) return;
  const user = ACCESS[norm(val)];
  if(user){
    hint.className='hint found'; hint.textContent='A entrar…';
    setTimeout(()=>{ window.location.href = user.dest; }, 380);
  } else {
    input.classList.remove('shake'); void input.offsetWidth; input.classList.add('shake');
    hint.className='hint error'; hint.textContent='Nome não encontrado — tente outra vez.';
    input.select();
  }
}
</script>
</body>
</html>
