
<style>
*{box-sizing:border-box;margin:0;padding:0}
.desktop{width:100%;height:600px;background:linear-gradient(155deg,#1A1520 0%,#2E2240 45%,#5C3D6E 75%,#C49A5A 100%);position:relative;font-family:'Inter',system-ui,sans-serif;display:flex;flex-direction:column;overflow:hidden}
.wave-bg{position:absolute;inset:0;pointer-events:none;z-index:1}
.taskbar{height:36px;flex-shrink:0;background:rgba(12,8,20,0.62);border-bottom:0.5px solid rgba(210,180,120,0.1);display:flex;align-items:center;padding:0 18px;gap:14px;z-index:20;position:relative}
.tb-logo{font-size:15px;font-weight:700;color:#E8C97A;letter-spacing:2px}
.tb-sep{width:0.5px;height:12px;background:rgba(210,180,120,0.2)}
.tb-time{margin-left:auto;font-size:10px;color:rgba(210,180,120,0.35)}
.tb-stat{display:flex;align-items:center;gap:5px;background:rgba(210,180,100,0.08);border:0.5px solid rgba(210,180,100,0.18);border-radius:999px;padding:3px 10px}
.tb-stat-num{font-size:11px;font-weight:600;color:#E8C97A;letter-spacing:-0.2px}
.tb-stat-lbl{font-size:9px;font-weight:500;color:rgba(210,180,100,0.5);text-transform:uppercase;letter-spacing:0.06em}
.tb-stat-dot{width:5px;height:5px;border-radius:50%;background:rgba(210,180,100,0.3);flex-shrink:0}
.tb-stat-dot.ok{background:#C9A84C}
.body{flex:1;display:flex;position:relative;overflow:hidden}
.left-zone{width:44%;display:flex;align-items:center;justify-content:center;z-index:10}
.modules-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(14px,2.2vw,32px)}
.mod{width:clamp(78px,8.1vw,106px);height:clamp(78px,8.1vw,106px);border-radius:22%;background:linear-gradient(145deg,#EEE0C0 0%,#D9C490 100%);box-shadow:5px 5px 14px rgba(10,6,20,0.5),-2px -2px 6px rgba(240,220,160,0.2),inset 0 1px 0 rgba(255,248,225,0.85),inset 0 -1px 0 rgba(140,110,50,0.2);border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(3px,0.4vw,6px);cursor:pointer;transition:all 0.2s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden}
.mod::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(180deg,rgba(255,250,230,0.45) 0%,rgba(255,235,170,0) 100%);border-radius:22% 22% 0 0;pointer-events:none}
.mod:hover{transform:translateY(-3px) scale(1.04)}
.mod:active{transform:translateY(0) scale(0.97)}
.mod-icon{position:relative;z-index:1}
.mod-icon svg{width:clamp(18px,2.0vw,28px);height:clamp(18px,2.0vw,28px);stroke:#4A3560;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round;display:block}
.mod-lbl{font-size:clamp(7px,0.65vw,10px);font-weight:600;letter-spacing:0.07em;color:#4A3560;text-transform:uppercase;white-space:nowrap;position:relative;z-index:1}
.divider{width:0.5px;background:rgba(210,180,100,0.08);margin:20px 0;align-self:stretch;z-index:5}
.right-zone{flex:1;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:0 clamp(22px,4vw,56px) 0 0;position:relative;z-index:5}
.dot-wrap{position:absolute;left:-8%;top:50%;transform:translateY(-50%);width:78%;pointer-events:none;opacity:0.12}
.dot-wrap svg{width:100%;height:auto}
.hero{text-align:right;position:relative;z-index:2}
.alm-letters{font-size:clamp(80px,13vw,160px);font-weight:700;color:#E8C97A;line-height:0.85;letter-spacing:-6px}
.alm-sub{font-size:clamp(7px,0.75vw,11px);letter-spacing:0.2em;color:rgba(232,200,120,0.75);text-transform:uppercase;margin-top:clamp(6px,0.8vw,12px);font-weight:600}
.branch-row{height:36px;flex-shrink:0;background:rgba(10,6,18,0.45);border-top:0.5px solid rgba(210,180,100,0.08);display:flex;align-items:center;justify-content:center;gap:6px;z-index:10;padding:0 18px;position:relative}
.branch{background:rgba(0,0,0,0.2);border:0.5px solid rgba(210,180,100,0.14);border-radius:999px;padding:4px 11px;font-size:clamp(8px,0.6vw,10px);color:rgba(210,180,100,0.4);cursor:pointer;transition:all 0.15s;font-weight:500}
.branch.active,.branch:hover{background:rgba(210,180,100,0.14);border-color:rgba(210,180,100,0.4);color:#E8C97A}
.overlay{display:none;position:absolute;inset:0;background:rgba(10,6,20,0.65);z-index:50;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:rgba(22,15,35,0.97);border:0.5px solid rgba(210,180,100,0.16);border-radius:18px;padding:0 0 16px;width:clamp(240px,28%,320px);max-height:80%;overflow-y:auto;scrollbar-width:none}
.modal::-webkit-scrollbar{display:none}
.modal-header{display:flex;align-items:center;gap:8px;padding:14px 16px 10px;border-bottom:0.5px solid rgba(210,180,100,0.1)}
.modal-dot{width:7px;height:7px;border-radius:50%;background:#C9A84C}
.modal-title{font-size:12px;font-weight:600;color:#E8C97A;text-transform:uppercase;letter-spacing:0.08em}
.modal-close{margin-left:auto;width:22px;height:22px;border-radius:50%;background:rgba(210,180,100,0.08);border:none;cursor:pointer;color:rgba(210,180,100,0.45);font-size:14px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(210,180,100,0.16);color:#E8C97A}
.sub-group{padding:6px 14px 2px}
.sub-group-title{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(210,180,100,0.28);padding:6px 0 5px}
.sub-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;margin:3px 0;background:rgba(210,180,100,0.04);border:0.5px solid rgba(210,180,100,0.09);border-radius:10px;cursor:pointer}
.sub-row:hover{background:rgba(210,180,100,0.1)}
.sub-row-left{display:flex;align-items:center;gap:8px}
.sub-dot{width:5px;height:5px;border-radius:50%;background:rgba(210,180,120,0.4)}
.sub-dot.warn{background:#B8903A}
.sub-dot.ok{background:#C9A84C}
.sub-text{font-size:12px;font-weight:500;color:rgba(235,210,155,0.82)}
.chevron{width:10px;height:10px;stroke:rgba(210,180,100,0.22);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
</style>

<script>
const d=new Date();
document.getElementById('t').textContent=d.toLocaleDateString('pt-PT',{weekday:'short',day:'numeric',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'});
const data={
  alunos:{title:'Alunos',groups:[{name:'Registo',items:[{t:'Novos registos',dot:'ok'},{t:'Consultas',dot:''},{t:'Histórico',dot:''},{t:'Desistências',dot:'warn'}]},{name:'Horário & Avaliação',items:[{t:'Horário do aluno',dot:''},{t:'Notas',dot:''},{t:'Justificações',dot:''}]},{name:'Família',items:[{t:'Encarregado de educação',dot:''}]}]},
  horarios:{title:'Horários',groups:[{name:'Gestão',items:[{t:'Marcações',dot:''},{t:'Mudanças',dot:'warn'},{t:'Pedidos',dot:'warn'}]},{name:'Casos & Inscrições',items:[{t:'Casos difíceis',dot:'warn'},{t:'Inscritos',dot:'ok'},{t:'Falta de inscrever',dot:'warn'}]}]},
  professores:{title:'Professores',groups:[{name:'Informação',items:[{t:'Consulta',dot:''},{t:'Por grupo',dot:''}]},{name:'Trabalho',items:[{t:'Testes',dot:''},{t:'Sumários',dot:''},{t:'Mensagens',dot:''}]}]},
  pagamentos:{title:'Pagamentos',groups:[{name:'Consulta',items:[{t:'Por aluno',dot:''},{t:'Listas',dot:''}]},{name:'Alertas',items:[{t:'Alertas & Atrasos',dot:'warn'},{t:'Isentos',dot:'ok'}]}]},
  turmas:{title:'Turmas',groups:[{name:'Visão Geral',items:[{t:'Mapa geral',dot:''},{t:'Por professor',dot:''},{t:'Por registo',dot:''}]},{name:'Totais',items:[{t:'Total por língua',dot:''},{t:'Total por nível',dot:''}]}]},
  testes:{title:'Testes',groups:[{name:'Avaliações',items:[{t:'Testes agendados',dot:'warn'},{t:'Resultados',dot:'ok'},{t:'Por professor',dot:''},{t:'Por turma',dot:''}]}]}
};
function openModal(key){
  const d=data[key];
  document.getElementById('modal-title').textContent=d.title;
  document.getElementById('modal-body').innerHTML=d.groups.map(g=>`<div class="sub-group"><div class="sub-group-title">${g.name}</div>${g.items.map(i=>`<div class="sub-row"><div class="sub-row-left"><div class="sub-dot ${i.dot||''}"></div><span class="sub-text">${i.t}</span></div><svg class="chevron" viewBox="0 0 14 14"><polyline points="5 2 10 7 5 12"/></svg></div>`).join('')}</div>`).join('');
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
function handleOverlay(e){if(e.target===document.getElementById('overlay'))closeModal()}
function setBranch(el){document.querySelectorAll('.branch').forEach(b=>b.classList.remove('active'));el.classList.add('active')}
</script>
