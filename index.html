<style>
*{box-sizing:border-box;margin:0;padding:0}
.desktop{width:100%;height:600px;background:linear-gradient(155deg,#6a5de0 0%,#3340b8 45%,#1520a0 100%);position:relative;font-family:'Inter',system-ui,sans-serif;display:flex;flex-direction:column}
.taskbar{height:36px;flex-shrink:0;background:rgba(10,15,45,0.58);border-bottom:0.5px solid rgba(255,255,255,0.09);display:flex;align-items:center;padding:0 18px;gap:14px;z-index:20}
.tb-logo{font-size:15px;font-weight:700;color:white;letter-spacing:2px}
.tb-sep{width:0.5px;height:12px;background:rgba(255,255,255,0.18)}
.tb-time{margin-left:auto;font-size:10px;color:rgba(255,255,255,0.3)}
.tb-stat{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.16);border-radius:999px;padding:3px 10px}
.tb-stat-num{font-size:11px;font-weight:600;color:white;letter-spacing:-0.2px}
.tb-stat-lbl{font-size:9px;font-weight:500;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.06em}
.tb-stat-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.3);flex-shrink:0}
.tb-stat-dot.ok{background:#30d158}
.body{flex:1;display:flex;position:relative;overflow:hidden}
.left-zone{width:44%;display:flex;align-items:center;justify-content:center;z-index:10}
.modules-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(14px,2.2vw,32px)}
.mod{width:clamp(78px,8.1vw,106px);height:clamp(78px,8.1vw,106px);border-radius:22%;background:#d9d9d9;box-shadow:5px 5px 12px rgba(10,20,90,0.28),-3px -3px 8px rgba(200,200,220,0.5),inset 0 1px 0 rgba(240,240,240,1),inset 0 -1px 0 rgba(160,170,200,0.3);border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(3px,0.4vw,6px);cursor:pointer;transition:all 0.2s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden}
.mod::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(180deg,rgba(255,255,255,0.4) 0%,rgba(255,255,255,0) 100%);border-radius:22% 22% 0 0;pointer-events:none}
.mod:hover{transform:translateY(-3px) scale(1.04)}
.mod:active{transform:translateY(0) scale(0.97)}
.mod-icon{position:relative;z-index:1}
.mod-icon svg{width:clamp(18px,2.0vw,28px);height:clamp(18px,2.0vw,28px);stroke:#3d4fd4;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round;display:block}
.mod-lbl{font-size:clamp(7px,0.65vw,10px);font-weight:600;letter-spacing:0.07em;color:#3d4fd4;text-transform:uppercase;white-space:nowrap;position:relative;z-index:1}
.divider{width:0.5px;background:rgba(255,255,255,0.07);margin:20px 0;align-self:stretch;z-index:5}
.right-zone{flex:1;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:0 clamp(22px,4vw,56px) 0 0;position:relative;z-index:5}
.wave-wrap{position:absolute;left:-8%;top:50%;transform:translateY(-50%);width:78%;pointer-events:none;opacity:0.17}
.wave-wrap svg{width:100%;height:auto}
.hero{text-align:right;position:relative;z-index:2}
.alm-letters{font-size:clamp(80px,13vw,160px);font-weight:700;color:white;line-height:0.85;letter-spacing:-6px}
.alm-sub{font-size:clamp(7px,0.75vw,11px);letter-spacing:0.2em;color:rgba(255,220,100,0.9);text-transform:uppercase;margin-top:clamp(6px,0.8vw,12px);font-weight:600}
.branch-row{height:36px;flex-shrink:0;background:rgba(10,15,45,0.38);border-top:0.5px solid rgba(255,255,255,0.09);display:flex;align-items:center;justify-content:center;gap:6px;z-index:10;padding:0 18px}
.branch{background:rgba(0,0,0,0.18);border:0.5px solid rgba(255,255,255,0.11);border-radius:999px;padding:4px 11px;font-size:clamp(8px,0.6vw,10px);color:rgba(255,255,255,0.42);cursor:pointer;transition:all 0.15s;font-weight:500}
.branch.active,.branch:hover{background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.32);color:white}
.overlay{display:none;position:absolute;inset:0;background:rgba(10,15,50,0.55);z-index:50;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:rgba(18,20,48,0.97);border:0.5px solid rgba(255,255,255,0.13);border-radius:18px;padding:0 0 16px;width:clamp(240px,28%,320px);max-height:80%;overflow-y:auto;scrollbar-width:none}
.modal::-webkit-scrollbar{display:none}
.modal-header{display:flex;align-items:center;gap:8px;padding:14px 16px 10px;border-bottom:0.5px solid rgba(255,255,255,0.09)}
.modal-dot{width:7px;height:7px;border-radius:50%;background:#C9A961}
.modal-title{font-size:12px;font-weight:600;color:#C9A961;text-transform:uppercase;letter-spacing:0.08em}
.modal-close{margin-left:auto;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;cursor:pointer;color:rgba(255,255,255,0.45);font-size:14px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(255,255,255,0.15);color:white}
.sub-group{padding:6px 14px 2px}
.sub-group-title{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.25);padding:6px 0 5px}
.sub-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;margin:3px 0;background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.07);border-radius:10px;cursor:pointer}
.sub-row:hover{background:rgba(255,255,255,0.09)}
.sub-row-left{display:flex;align-items:center;gap:8px}
.sub-dot{width:5px;height:5px;border-radius:50%;background:rgba(160,170,255,0.65)}
.sub-dot.warn{background:#f59e0b}
.sub-dot.ok{background:#30d158}
.sub-text{font-size:12px;font-weight:500;color:rgba(255,255,255,0.8)}
.chevron{width:10px;height:10px;stroke:rgba(255,255,255,0.2);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
</style>

<div class="desktop">
  <div class="taskbar">
    <span class="tb-logo">ALM</span>
    <div class="tb-sep"></div>
    <div class="tb-stat"><div class="tb-stat-dot ok"></div><div class="tb-stat-num">347</div><div class="tb-stat-lbl">Alunos</div></div>
    <div class="tb-stat"><div class="tb-stat-dot"></div><div class="tb-stat-num">24</div><div class="tb-stat-lbl">Turmas</div></div>
    <div class="tb-stat"><div class="tb-stat-dot"></div><div class="tb-stat-num">12</div><div class="tb-stat-lbl">Professores</div></div>
    <span class="tb-time" id="t"></span>
  </div>

  <div class="body">
    <div class="left-zone">
      <div class="modules-grid">
        <div class="mod" onclick="openModal('alunos')">
          <div class="mod-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
          <div class="mod-lbl">Alunos</div>
        </div>
        <div class="mod" onclick="openModal('horarios')">
          <div class="mod-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></div>
          <div class="mod-lbl">Horários</div>
        </div>
        <div class="mod" onclick="openModal('professores')">
          <div class="mod-icon"><svg viewBox="0 0 24 24"><path d="M4 19V6a2 2 0 012-2h12a2 2 0 012 2v13"/><path d="M4 19h16M9 10h6M9 14h4"/></svg></div>
          <div class="mod-lbl">Professores</div>
        </div>
        <div class="mod" onclick="openModal('pagamentos')">
          <div class="mod-icon"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg></div>
          <div class="mod-lbl">Pagamentos</div>
        </div>
        <div class="mod" onclick="openModal('turmas')">
          <div class="mod-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>
          <div class="mod-lbl">Turmas</div>
        </div>
        <div class="mod" onclick="openModal('testes')">
          <div class="mod-icon"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
          <div class="mod-lbl">Testes</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="right-zone">
      <div class="wave-wrap">
        <svg viewBox="0 0 520 560" xmlns="http://www.w3.org/2000/svg" fill="white">
          <circle cx="80" cy="200" r="2.2"/><circle cx="98" cy="190" r="2.2"/><circle cx="116" cy="182" r="2.2"/><circle cx="134" cy="178" r="2.2"/><circle cx="152" cy="181" r="2.2"/><circle cx="170" cy="190" r="2.2"/><circle cx="188" cy="200" r="2.2"/><circle cx="206" cy="208" r="2.2"/><circle cx="224" cy="213" r="2.2"/><circle cx="242" cy="215" r="2.2"/><circle cx="260" cy="213" r="2.2"/><circle cx="278" cy="208" r="2.2"/><circle cx="296" cy="200" r="2.2"/><circle cx="314" cy="191" r="2.2"/>
          <circle cx="72" cy="218" r="2.2"/><circle cx="90" cy="207" r="2.2"/><circle cx="108" cy="198" r="2.2"/><circle cx="126" cy="194" r="2.2"/><circle cx="144" cy="197" r="2.2"/><circle cx="162" cy="207" r="2.2"/><circle cx="180" cy="217" r="2.2"/><circle cx="198" cy="226" r="2.2"/><circle cx="216" cy="231" r="2.2"/><circle cx="234" cy="233" r="2.2"/><circle cx="252" cy="231" r="2.2"/><circle cx="270" cy="225" r="2.2"/><circle cx="288" cy="217" r="2.2"/>
          <circle cx="66" cy="236" r="2.2"/><circle cx="84" cy="224" r="2.2"/><circle cx="102" cy="215" r="2.2"/><circle cx="120" cy="211" r="2.2"/><circle cx="138" cy="214" r="2.2"/><circle cx="156" cy="224" r="2.2"/><circle cx="174" cy="235" r="2.2"/><circle cx="192" cy="244" r="2.2"/><circle cx="210" cy="249" r="2.2"/><circle cx="228" cy="251" r="2.2"/><circle cx="246" cy="249" r="2.2"/>
          <circle cx="62" cy="254" r="2.2"/><circle cx="80" cy="242" r="2.2"/><circle cx="98" cy="232" r="2.2"/><circle cx="116" cy="228" r="2.2"/><circle cx="134" cy="231" r="2.2"/><circle cx="152" cy="241" r="2.2"/><circle cx="170" cy="252" r="2.2"/><circle cx="188" cy="261" r="2.2"/>
          <circle cx="60" cy="272" r="2.2"/><circle cx="78" cy="260" r="2.2"/><circle cx="96" cy="250" r="2.2"/><circle cx="114" cy="246" r="2.2"/><circle cx="132" cy="249" r="2.2"/><circle cx="150" cy="259" r="2.2"/><circle cx="168" cy="270" r="2.2"/>
          <circle cx="90" cy="168" r="2.2"/><circle cx="108" cy="160" r="2.2"/><circle cx="126" cy="154" r="2.2"/><circle cx="144" cy="151" r="2.2"/><circle cx="162" cy="154" r="2.2"/><circle cx="180" cy="162" r="2.2"/>
          <circle cx="100" cy="148" r="2.2"/><circle cx="118" cy="140" r="2.2"/><circle cx="136" cy="135" r="2.2"/><circle cx="154" cy="133" r="2.2"/>
          <circle cx="112" cy="130" r="2.2"/><circle cx="130" cy="122" r="2.2"/>
        </svg>
      </div>
      <div class="hero">
        <div class="alm-letters">ALM</div>
        <div class="alm-sub">Academia de Línguas da Madeira</div>
      </div>
    </div>

    <div class="overlay" id="overlay" onclick="handleOverlay(event)">
      <div class="modal" id="modal">
        <div class="modal-header">
          <div class="modal-dot"></div>
          <div class="modal-title" id="modal-title">—</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div id="modal-body"></div>
      </div>
    </div>
  </div>

  <div class="branch-row">
    <div class="branch active" onclick="setBranch(this)">Funchal · Sede</div>
    <div class="branch" onclick="setBranch(this)">Machico</div>
    <div class="branch" onclick="setBranch(this)">S. Cruz</div>
    <div class="branch" onclick="setBranch(this)">R. Brava</div>
    <div class="branch" onclick="setBranch(this)">Calheta</div>
    <div class="branch" onclick="setBranch(this)">P. do Sol</div>
    <div class="branch" onclick="setBranch(this)">Estreito</div>
  </div>
</div>

<script>
const d=new Date();
document.getElementById('t').textContent=d.toLocaleDateString('pt-PT',{weekday:'short',day:'numeric',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'});
const data={
  alunos:{title:'Alunos',groups:[{name:'Registo',items:[{t:'Novos registos',dot:'ok'},{t:'Consultas',dot:''},{t:'Histórico',dot:''},{t:'Desistências',dot:'warn'}]},{name:'Horário & Avaliação',items:[{t:'Horário do aluno',dot:''},{t:'Notas',dot:''},{t:'Justificações',dot:''}]},{name:'Família',items:[{t:'Encarregado de educação',dot:''}]}]},
  horarios:{title:'Horários',groups:[{name:'Gestão',items:[{t:'Marcações',dot:''},{t:'Mudanças',dot:'warn'},{t:'Pedidos',dot:'warn'}]},{name:'Casos & Inscrições',items:[{t:'Casos difíceis',dot:'warn'},{t:'Inscritos',dot:'ok'},{t:'Falta de inscrever',dot:'warn'}]}]},
  professores:{title:'Professores',groups:[{name:'Informação',items:[{t:'Consulta',dot:''},{t:'Por grupo',dot:''}]},{name:'Trabalho',items:[{t:'Testes',dot:''},{t:'Sumários',dot:''},{t:'Mensagens',dot:''}]}]},
  pagamentos:{title:'Pagamentos',groups:[{name:'Consulta',items:[{t:'Por aluno',dot:''},{t:'Listas',dot:''}]},{name:'Alertas',items:[{t:'Alertas & Atrasos',dot:'warn'},{t:'Isentos',dot:'ok'}]}]},
  turmas:{title:'Turmas',groups:[{name:'Visão Geral',items:[{t:'Mapa geral',dot:''},{t:'Por professor',dot:''},{t:'Por registo',dot:''}]},{name:'Totais',items:[{t:'Total por língua',dot:''},{t:'Total por nível',dot:''}]}]},
  testes:{title:'Testes',groups:[{name:'Avaliações',items:[{t:'Testes agendados',dot:'warn'},{t:'Resultados',dot:'ok'},{t:'Por professor',dot:''},{t:'Por turma',dot:''}]}]}
};
function openModal(key){
  const d=data[key];
  document.getElementById('modal-title').textContent=d.title;
  document.getElementById('modal-body').innerHTML=d.groups.map(g=>`<div class="sub-group"><div class="sub-group-title">${g.name}</div>${g.items.map(i=>`<div class="sub-row"><div class="sub-row-left"><div class="sub-dot ${i.dot||''}"></div><span class="sub-text">${i.t}</span></div><svg class="chevron" viewBox="0 0 14 14"><polyline points="5 2 10 7 5 12"/></svg></div>`).join('')}</div>`).join('');
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
function handleOverlay(e){if(e.target===document.getElementById('overlay'))closeModal()}
function setBranch(el){document.querySelectorAll('.branch').forEach(b=>b.classList.remove('active'));el.classList.add('active')}
</script>
