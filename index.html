<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#e8eaf0;
  --accent:#5b6af5;
  --gold:#c9a84c;
  --text-primary:#2d3142;
  --text-secondary:#6b7280;
  --text-tertiary:#9ca3af;
  --shadow-out:6px 6px 14px #b2b8c6,-6px -6px 14px #ffffff;
  --shadow-sm:3px 3px 8px #b2b8c6,-3px -3px 8px #ffffff;
  --shadow-in:inset 4px 4px 10px #b2b8c6,inset -4px -4px 10px #ffffff;
  --font:'Inter',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--bg)}
.screen{background:var(--bg);padding:0 0 2rem;min-height:100vh;position:relative}

.header{background:linear-gradient(145deg,#eef0f6,#dde0ea);box-shadow:var(--shadow-out);padding:2rem 1.5rem 1.5rem;text-align:center}
.header-crest{width:56px;height:56px;background:linear-gradient(145deg,#eef0f6,#d8dbe6);box-shadow:var(--shadow-out);border-radius:16px;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center}
.header-title{font-size:22px;font-weight:700;letter-spacing:-.3px;color:var(--text-primary);line-height:1.2}
.header-sub{font-size:12px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-top:.35rem}
.header-date{font-size:12px;color:var(--text-tertiary);margin-top:.5rem}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:1.25rem 1rem 0}
.stat-card{background:linear-gradient(145deg,#eef0f6,#dde0ea);box-shadow:var(--shadow-sm);border-radius:16px;padding:.85rem .7rem;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:var(--text-primary);letter-spacing:-.5px}
.stat-lbl{font-size:10px;color:var(--text-tertiary);margin-top:2px;font-weight:500;letter-spacing:.04em;text-transform:uppercase}

.section-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-tertiary);padding:.9rem 1.25rem .4rem}

.school-scroll{display:flex;gap:10px;padding:0 1rem;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.school-scroll::-webkit-scrollbar{display:none}
.school-pill{background:linear-gradient(145deg,#eef0f6,#dde0ea);box-shadow:var(--shadow-sm);border-radius:999px;padding:.5rem 1.1rem;font-size:13px;font-weight:500;color:var(--text-secondary);white-space:nowrap;cursor:pointer;flex-shrink:0;transition:all .2s}
.school-pill.active{background:linear-gradient(145deg,#6b7af9,#4e5ee8);box-shadow:4px 4px 10px rgba(91,106,245,.35),-2px -2px 8px rgba(255,255,255,.6);color:#fff}

.menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:0 1rem;margin-top:.25rem}
.menu-btn{background:linear-gradient(145deg,#eef0f6,#dde0ea);box-shadow:var(--shadow-out);border-radius:20px;padding:1.1rem .5rem .9rem;text-align:center;cursor:pointer;transition:all .18s;border:none;outline:none}
.menu-btn:active{box-shadow:var(--shadow-in);background:linear-gradient(145deg,#dde0ea,#eef0f6)}
.menu-icon-wrap{width:44px;height:44px;background:linear-gradient(145deg,#eef0f6,#dde0ea);box-shadow:var(--shadow-sm);border-radius:14px;margin:0 auto .55rem;display:flex;align-items:center;justify-content:center;transition:all .18s}
.menu-icon-wrap svg{width:20px;height:20px;stroke:var(--accent);stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
.menu-lbl{font-size:12px;font-weight:600;color:var(--text-primary);letter-spacing:-.1px}
.menu-sub{font-size:10px;color:var(--text-tertiary);margin-top:1px}

.bottom-bar{display:flex;justify-content:space-around;align-items:center;margin:1.25rem 1rem 0;background:linear-gradient(145deg,#eef0f6,#dde0ea);box-shadow:var(--shadow-out);border-radius:999px;padding:.65rem 1rem}
.bar-btn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:.3rem .8rem;border-radius:999px;transition:all .15s}
.bar-btn.active{background:linear-gradient(145deg,#dde0ea,#eef0f6);box-shadow:inset 2px 2px 5px #b2b8c6,inset -2px -2px 5px #ffffff}
.bar-btn svg{width:18px;height:18px;stroke:var(--text-tertiary);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.bar-btn.active svg{stroke:var(--accent)}
.bar-lbl{font-size:9px;font-weight:500;color:var(--text-tertiary);letter-spacing:.04em;text-transform:uppercase}
.bar-btn.active .bar-lbl{color:var(--accent)}

/* OVERLAY */
.overlay{
  display:none;
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(30,32,48,0.38);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  z-index:100;
  align-items:flex-end;
  justify-content:center;
  min-height:100vh;
}
.overlay.open{display:flex}

/* MODAL CARD */
.modal{
  width:100%;
  background:linear-gradient(160deg,#eef0f6 60%,#e2e5ef);
  border-radius:28px 28px 0 0;
  box-shadow:0 -8px 32px rgba(80,90,140,.18),0 -2px 8px rgba(80,90,140,.08);
  padding:0 0 2rem;
  transform:translateY(100%);
  transition:transform .38s cubic-bezier(.32,1.1,.55,1);
  max-height:82vh;
  overflow-y:auto;
  scrollbar-width:none;
}
.modal::-webkit-scrollbar{display:none}
.overlay.open .modal{transform:translateY(0)}

.modal-handle{width:40px;height:4px;background:rgba(100,110,160,.22);border-radius:99px;margin:14px auto 0}
.modal-header{display:flex;align-items:center;gap:.65rem;padding:1.1rem 1.25rem .5rem}
.modal-dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,#6b7af9,#a78bfa);box-shadow:0 0 8px rgba(107,122,249,.45)}
.modal-title{font-size:18px;font-weight:700;color:var(--text-primary);letter-spacing:-.3px}
.modal-close{margin-left:auto;width:28px;height:28px;border-radius:50%;background:linear-gradient(145deg,#eef0f6,#dde0ea);box-shadow:var(--shadow-sm);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-close svg{width:13px;height:13px;stroke:var(--text-secondary);stroke-width:2.2;fill:none;stroke-linecap:round}

.sub-group{padding:.2rem 1.1rem .4rem}
.sub-group-title{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text-tertiary);padding:.5rem 0 .35rem}
.sub-row{display:flex;align-items:center;justify-content:space-between;padding:.6rem .75rem;margin:.18rem 0;background:linear-gradient(145deg,#f0f2f8,#e4e7f0);box-shadow:2px 2px 6px #b2b8c6,-2px -2px 6px #ffffff;border-radius:13px;cursor:pointer;transition:box-shadow .15s}
.sub-row:active{box-shadow:inset 2px 2px 5px #b2b8c6,inset -2px -2px 5px #ffffff}
.sub-row-left{display:flex;align-items:center;gap:.55rem}
.sub-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:.65}
.sub-dot.warn{background:#f59e0b;opacity:.9}
.sub-dot.ok{background:#22c55e;opacity:.9}
.sub-text{font-size:13px;font-weight:500;color:var(--text-primary)}
.chevron{width:14px;height:14px;stroke:var(--text-tertiary);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
</style>

<div class="screen" id="screen">

  <div class="header">
    <div class="header-crest">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <path d="M14 3L5 8v6c0 5 4 9.5 9 11 5-1.5 9-6 9-11V8L14 3z" stroke="#5b6af5" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M10 14h8M14 10v8" stroke="#c9a84c" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="header-title">Academia de Línguas<br>da Madeira</div>
    <div class="header-sub">Sistema de Gestão · Funchal</div>
    <div class="header-date" id="hdate"></div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-num">347</div><div class="stat-lbl">Alunos</div></div>
    <div class="stat-card"><div class="stat-num">24</div><div class="stat-lbl">Turmas</div></div>
    <div class="stat-card"><div class="stat-num">12</div><div class="stat-lbl">Professores</div></div>
  </div>

  <div class="section-label">Escola / Filial</div>
  <div class="school-scroll">
    <div class="school-pill active" onclick="setPill(this)">Funchal · Sede</div>
    <div class="school-pill" onclick="setPill(this)">Filial 1</div>
    <div class="school-pill" onclick="setPill(this)">Filial 2</div>
    <div class="school-pill" onclick="setPill(this)">Filial 3</div>
    <div class="school-pill" onclick="setPill(this)">Filial 4</div>
    <div class="school-pill" onclick="setPill(this)">Filial 5</div>
    <div class="school-pill" onclick="setPill(this)">Filial 6</div>
  </div>

  <div class="section-label">Módulos</div>
  <div class="menu-grid">
    <button class="menu-btn" onclick="openModal('alunos')">
      <div class="menu-icon-wrap"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
      <div class="menu-lbl">Alunos</div><div class="menu-sub">347 activos</div>
    </button>
    <button class="menu-btn" onclick="openModal('horarios')">
      <div class="menu-icon-wrap"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></div>
      <div class="menu-lbl">Horários</div><div class="menu-sub">24 turmas</div>
    </button>
    <button class="menu-btn" onclick="openModal('professores')">
      <div class="menu-icon-wrap"><svg viewBox="0 0 24 24"><path d="M4 19V6a2 2 0 012-2h12a2 2 0 012 2v13"/><path d="M4 19h16M9 10h6M9 14h4"/></svg></div>
      <div class="menu-lbl">Professores</div><div class="menu-sub">12 docentes</div>
    </button>
    <button class="menu-btn" onclick="openModal('pagamentos')">
      <div class="menu-icon-wrap"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg></div>
      <div class="menu-lbl">Pagamentos</div><div class="menu-sub">3 alertas</div>
    </button>
    <button class="menu-btn" onclick="openModal('turmas')">
      <div class="menu-icon-wrap"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg></div>
      <div class="menu-lbl">Turmas</div><div class="menu-sub">Mapa geral</div>
    </button>
    <button class="menu-btn" onclick="openModal('testes')">
      <div class="menu-icon-wrap"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
      <div class="menu-lbl">Testes</div><div class="menu-sub">Avaliações</div>
    </button>
  </div>

  <div class="bottom-bar">
    <div class="bar-btn active">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <div class="bar-lbl">Início</div>
    </div>
    <div class="bar-btn">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <div class="bar-lbl">Pesquisa</div>
    </div>
    <div class="bar-btn">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <div class="bar-lbl">Alertas</div>
    </div>
    <div class="bar-btn">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <div class="bar-lbl">Perfil</div>
    </div>
  </div>

  <!-- MODAL OVERLAY -->
  <div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
    <div class="modal" id="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-dot"></div>
        <div class="modal-title" id="modal-title">—</div>
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 14 14"><line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/></svg>
        </button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

</div>

<script>
document.getElementById('hdate').textContent = new Date().toLocaleDateString('pt-PT',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

const data = {
  alunos:{title:'Alunos',groups:[
    {name:'Registo',items:[{t:'Novos registos',dot:'ok'},{t:'Consultas',dot:''},{t:'Histórico',dot:''},{t:'Desistências',dot:'warn'}]},
    {name:'Horário & Avaliação',items:[{t:'Horário do aluno',dot:''},{t:'Notas',dot:''},{t:'Justificações',dot:''}]},
    {name:'Família',items:[{t:'Encarregado de educação',dot:''}]},
  ]},
  horarios:{title:'Horários',groups:[
    {name:'Gestão',items:[{t:'Marcações',dot:''},{t:'Mudanças',dot:'warn'},{t:'Pedidos',dot:'warn'}]},
    {name:'Casos & Inscrições',items:[{t:'Casos difíceis',dot:'warn'},{t:'Inscritos',dot:'ok'},{t:'Falta de inscrever',dot:'warn'}]},
  ]},
  professores:{title:'Professores',groups:[
    {name:'Informação',items:[{t:'Consulta',dot:''},{t:'Por grupo',dot:''}]},
    {name:'Trabalho',items:[{t:'Testes',dot:''},{t:'Sumários',dot:''},{t:'Mensagens',dot:''}]},
  ]},
  pagamentos:{title:'Pagamentos',groups:[
    {name:'Consulta',items:[{t:'Por aluno',dot:''},{t:'Listas',dot:''}]},
    {name:'Alertas',items:[{t:'Alertas & Atrasos',dot:'warn'},{t:'Isentos',dot:'ok'}]},
  ]},
  turmas:{title:'Turmas',groups:[
    {name:'Visão Geral',items:[{t:'Mapa geral',dot:''},{t:'Por professor',dot:''},{t:'Por registo',dot:''}]},
    {name:'Totais',items:[{t:'Total por língua',dot:''},{t:'Total por nível',dot:''}]},
  ]},
  testes:{title:'Testes',groups:[
    {name:'Avaliações',items:[{t:'Testes agendados',dot:'warn'},{t:'Resultados',dot:'ok'},{t:'Por professor',dot:''},{t:'Por turma',dot:''}]},
  ]},
};

function openModal(key){
  const d = data[key];
  document.getElementById('modal-title').textContent = d.title;
  document.getElementById('modal-body').innerHTML = d.groups.map(g=>`
    <div class="sub-group">
      <div class="sub-group-title">${g.name}</div>
      ${g.items.map(i=>`
        <div class="sub-row">
          <div class="sub-row-left">
            <div class="sub-dot ${i.dot||''}"></div>
            <span class="sub-text">${i.t}</span>
          </div>
          <svg class="chevron" viewBox="0 0 14 14"><polyline points="5 2 10 7 5 12"/></svg>
        </div>
      `).join('')}
    </div>
  `).join('');
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
}

function handleOverlayClick(e){
  if(e.target===document.getElementById('overlay')) closeModal();
}

function setPill(el){
  document.querySelectorAll('.school-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
}
</script>
